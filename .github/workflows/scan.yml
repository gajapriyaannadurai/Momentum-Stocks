name: Momentum Stocks Scanner

on:
  schedule:
    - cron: '30 11 * * 1-5'   # 5:00 PM IST (11:30 UTC) weekdays
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Run scanner
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT:   ${{ secrets.REPORT_RECIPIENT }}
        run: python scanner.py

      - name: Commit results
        run: |
          git config user.name  "CPR Pro Scanner"
          git config user.email "cpr-scanner@github-actions"
          git add docs/results.json
          git diff --staged --quiet || git commit -m "Scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || true
